<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>0.5x example segment visualization</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; }
    body { margin: 0; background: #0d1520; color: #edf4fb; }
    main { width: min(1120px, calc(100% - 32px)); margin: 32px auto 72px; }
    h1 { margin: 0 0 20px; font-size: clamp(1.25rem, 3vw, 2rem); font-weight: 650; }
    h2 { margin: 0 0 12px; font-size: 1rem; text-transform: lowercase; }
    .segment-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .segment { padding: 14px; background: #162331; border: 1px solid #2b4053; border-radius: 10px; }
    .segment.active { border-color: #009e73; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; }
    button { border: 0; border-radius: 7px; padding: 9px 13px; background: #344454; color: white; font-weight: 650; cursor: pointer; }
    button[aria-pressed="true"] { background: #009e73; }
    button:hover, button:focus-visible { filter: brightness(1.13); }
    .viewer { margin-top: 12px; padding: 0; overflow: hidden; background: #000; border: 1px solid #2b4053; border-radius: 10px; }
    iframe { display: block; width: 100%; height: 74vh; min-height: 540px; border: 0; background: #000; }
    footer { margin-top: 56px; padding-top: 22px; border-top: 1px solid #2b4053; color: #aebfce; line-height: 1.6; }
    a { color: #56b4e9; }
    @media (max-width: 760px) {
      .segment-grid { grid-template-columns: 1fr; }
      .controls button { flex: 1; }
      iframe { min-height: 430px; }
    }
  </style>
</head>
<body>
<main>
  <h1>0.5x · 20 s example segment visualization</h1>

  <div class="segment-grid">
    <section class="segment active" data-segment-card="0">
      <h2>segment 1</h2>
      <div class="controls">
        <button data-segment="0" data-rate="0.5" aria-pressed="true">Load 0.5x</button>
        <button data-segment="0" data-rate="1" aria-pressed="false">Load 1x</button>
      </div>
    </section>

    <section class="segment" data-segment-card="1">
      <h2>segment 2</h2>
      <div class="controls">
        <button data-segment="1" data-rate="0.5" aria-pressed="false">Load 0.5x</button>
        <button data-segment="1" data-rate="1" aria-pressed="false">Load 1x</button>
      </div>
    </section>
  </div>

  <section class="viewer">
    <iframe id="viewer-frame" src="media/run1_calibrated.html" title="segment 1 at 0.5x" allowfullscreen></iframe>
  </section>

  <footer>
    Built on the excellent work of
    <a href="https://github.com/well-robotics/PRIME">PRIME</a>
    (well-robotics), BSD-3. The visualizations are built on top of PRIME's
    excellent estimator and use its experiment scene palette.
    Source and local replay instructions are in
    <a href="https://github.com/DLinC3/LegBiCal">LegBiCal</a>.
  </footer>
</main>
<script>
  const segments = [
    { label: "segment 1", source: "media/run1_calibrated.html" },
    { label: "segment 2", source: "media/run2_calibrated.html" },
  ];
  const frame = document.querySelector("#viewer-frame");
  let segmentIndex = 0;
  let playbackRate = 0.5;
  let generation = 0;
  let readyTimer = null;
  let fallbackTimer = null;

  function sourceFor(segment, rate) {
    return segments[segment].source + (rate === 1 ? "?speed=1" : "");
  }

  function updateSelection() {
    document.querySelectorAll("[data-segment-card]").forEach((card) => {
      card.classList.toggle("active", Number(card.dataset.segmentCard) === segmentIndex);
    });
    document.querySelectorAll("button[data-segment][data-rate]").forEach((button) => {
      const selected = Number(button.dataset.segment) === segmentIndex &&
        Number(button.dataset.rate) === playbackRate;
      button.setAttribute("aria-pressed", String(selected));
    });
  }

  function loadSegment(nextSegment, nextRate, scrollToViewer = false) {
    generation += 1;
    window.clearTimeout(readyTimer);
    window.clearTimeout(fallbackTimer);
    segmentIndex = nextSegment;
    playbackRate = nextRate;
    updateSelection();
    frame.title = `${segments[segmentIndex].label} at ${playbackRate}x`;
    frame.src = sourceFor(segmentIndex, playbackRate);
    if (scrollToViewer) {
      frame.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }

  function connectAutoAdvance(expectedGeneration) {
    let attempts = 0;
    function connect() {
      if (expectedGeneration !== generation) return;
      const childViewer = frame.contentWindow && frame.contentWindow.viewer;
      const animator = childViewer && childViewer.animator;
      const mixer = animator && animator.mixer;
      if (!mixer || !(animator.duration > 0)) {
        attempts += 1;
        if (attempts < 600) readyTimer = window.setTimeout(connect, 50);
        return;
      }

      let advanced = false;
      function advance() {
        if (advanced || expectedGeneration !== generation) return;
        advanced = true;
        window.clearTimeout(fallbackTimer);
        loadSegment((segmentIndex + 1) % segments.length, playbackRate);
      }

      mixer.addEventListener("finished", advance);
      const expectedMilliseconds = animator.duration * 1000 / playbackRate;
      fallbackTimer = window.setTimeout(advance, Math.ceil(expectedMilliseconds) + 1500);
    }
    connect();
  }

  document.querySelectorAll("button[data-segment][data-rate]").forEach((button) => {
    button.addEventListener("click", () => {
      loadSegment(
        Number(button.dataset.segment),
        Number(button.dataset.rate),
        true,
      );
    });
  });

  frame.addEventListener("load", () => connectAutoAdvance(generation));
  updateSelection();
</script>
</body>
</html>
